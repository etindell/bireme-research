{% load compliance_tags %}
{% for task in tasks %}
<tr class="hover:bg-gray-50 {% if task.is_overdue %}bg-red-50{% endif %}">
    <td class="px-4 py-3">
        <span class="inline-flex items-center rounded-full px-2 py-0.5 text-xs font-medium {{ task.status|status_badge_class }}">
            {{ task.status|status_label }}
        </span>
    </td>
    <td class="px-4 py-3">
        <a href="{% url 'compliance:task_detail' task.pk %}" class="text-sm font-medium text-gray-900 hover:text-primary-600">
            {{ task.title }}
        </a>
    </td>
    <td class="px-4 py-3 text-sm {% if task.is_overdue %}text-red-600 font-medium{% else %}text-gray-500{% endif %}">
        {{ task.due_date|date:"M j, Y" }}
    </td>
    <td class="px-4 py-3 text-xs text-gray-500">{{ task.tags }}</td>
    <td class="px-4 py-3 text-sm text-right">
        <a href="{% url 'compliance:task_detail' task.pk %}" class="text-primary-600 hover:text-primary-500">View</a>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="5" class="px-4 py-8 text-center text-sm text-gray-500">No tasks found.</td>
</tr>
{% endfor %}
