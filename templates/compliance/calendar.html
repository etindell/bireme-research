{% extends "base.html" %}
{% load compliance_tags %}

{% block title %}Compliance Calendar - {{ month_name }} {{ year }}{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto space-y-6">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-gray-900">Compliance Calendar</h1>
        <div class="flex items-center gap-x-2">
            <a href="{% url 'compliance:calendar_year' %}?year={{ year }}" class="rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50">Year View</a>
        </div>
    </div>

    <div id="calendar-content">
        {% include "compliance/partials/calendar_month.html" %}
    </div>
</div>
{% endblock %}
